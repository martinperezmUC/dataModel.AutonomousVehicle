type: object
title: Platform
description: A Platform is an entity that hosts other entities, particularly Sensors,
  Actuators, Samplers, and other Platforms.
properties:
  type:
    description: Property. NGSI entity type. It must be equal to `Platform`
    enum:
    - Platform
    type: string
    x-ngsi:
      type: Property
  hosts:
    description: Relation between a Platform and a Sensor, Actuator, Sampler, or Platform hosted on it.
    type: array
    items:
      type: string
      format: uri
    x-ngsi:
      type: Relationship
required:
- id
- type
