allOf:
  - $ref: "ObservableProperty.yaml"
  - type: object
    description: ObservableProperty representing geographic location.
    properties:
      type:
        description: NGSI entity type. Must be `GNSSObservableProperty`
        type: string
        enum:
          - GNSSObservableProperty
        x-ngsi:
          type: Property

      description:
        type: string
        description: Medición de ubicación (latitud, longitud y altitud)
        x-ngsi:
          type: Property
    required:
      - id
      - type