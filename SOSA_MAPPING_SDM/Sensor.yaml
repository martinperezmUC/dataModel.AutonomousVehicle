type: object
title: Sensor
description: Device, agent (including humans), or software (simulation) involved
  in, or implementing, a Procedure. Sensors respond to a stimulus, e.g., a change
  in the environment, or input data composed from the results of prior Observations,
  and generate a Result. Sensors can be hosted by Platforms.
properties:
  type:
    description: NGSI Entity type. It has to be Sensor
    enum:
      - Sensor
    type: string
    x-ngsi:
      type: Property
  madeObservation:
    description: Relation between a Sensor and an Observation made by the Sensor.
    type: string
    format: uri
    x-ngsi:
      type: Relationship
  isHostedBy:
    description: Relation between a Sensor and the Platform that it is hosted by.
    type: string
    format: uri
    x-ngsi:
      type: Relationship
required:
- id
- type
